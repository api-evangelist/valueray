description: AI-ready financial data API for stocks and ETFs. ValueRay aggregates technical, quantitative, and sentiment data
  with risk metrics, peer percentiles, and market regime signals into AI/LLM-friendly responses optimized for agents that
  need explainable financial overviews of specific symbols.
