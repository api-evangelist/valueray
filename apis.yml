    url: capabilities/symbol-data-symbol-data.yaml
  description: Returns a comprehensive AI-ready snapshot of a single stock or ETF symbol, aggregating core identifiers (code,
    ISIN, exchange, sector, industry, peer group), market data (market cap, last price, 52-week range), dividend information
    (rate, yield, payout, growth, streak), technical indicators (EMA, SMA, ATR, RSI, volatility, volume), risk metrics (safety
    score, beta, alpha, Sharpe ratio, max drawdown, VaR, tail risk), sentiment (VRO score, buy signals, sector and industry
    rotation), support and resistance levels, zigzag pivot points, change points, and performance returns from 1d through
    5y. Responses include field explanation pointers so AI agents can ground their analysis in published metric definitions.
