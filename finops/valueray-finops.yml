specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: ValueRay
providerId: valueray
created: '2026-05-06'
modified: '2026-05-06'
reconciled: false
tags:
  - AI/LLM
  - Financial Data
  - FinOps
  - FOCUS
  - Stocks
description: >-
  FOCUS-aligned FinOps profile for ValueRay. ValueRay currently exposes
  only a free public tier of its AI-ready Symbol Data API; no paid plans
  or invoice-bearing offering have been published. This profile captures
  the FinOps surface that would apply once paid tiers ship and is marked
  unreconciled until then.
sources:
  - https://www.valueray.com/api
  - https://www.valueray.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ValueRay
serviceCategory: Market Data
billingModel:
  pricingCategory: Free
  billingFrequency: NotApplicable
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: ValueRay Symbol Data API
  ServiceCategory: Market Data
  ProviderName: ValueRay
  PublisherName: ValueRay
  InvoiceIssuerName: ValueRay
  BillingCurrency: USD
meters:
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_token
      - symbol
principles:
  - name: Visibility
    description: Track call volume per consumer to project demand against the published 1 request/minute
      throttle and to inform any future paid-tier sizing.
  - name: Allocation
    description: Tag calls by application or agent so usage is attributable when a paid tier ships.
  - name: Optimization
    description: Cache symbol responses locally; the response includes a field_explanations URL that can be
      fetched once and reused, reducing repeat calls.
  - name: Accountability
    description: Designate an owner for ValueRay usage tracking; revisit when ValueRay publishes formal
      pricing and metering policies.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
